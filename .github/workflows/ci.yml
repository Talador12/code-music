name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check code_music tests examples
      - name: Test
        run: pytest tests/ -v
      - name: Smoke render (hello world)
        run: python -m code_music.cli examples/hello_world.py -o /tmp/hello_world.wav
