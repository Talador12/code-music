name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  ################################################################################
  # Lint + Test
  ################################################################################
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check code_music tests songs samples scales scripts albums

      - name: Test
        run: pytest tests/ -v

      - name: Smoke render — hello world
        run: python -m code_music.cli songs/hello_world.py -o /tmp/hello_world.wav

      - name: Smoke render — trance odyssey
        run: python -m code_music.cli songs/trance_odyssey.py -o /tmp/trance.wav

      - name: Smoke render — tank bebop
        run: python -m code_music.cli songs/tank_bebop.py -o /tmp/bebop.wav

      - name: Smoke render — deep space drift (ambient)
        run: python -m code_music.cli songs/deep_space_drift.py -o /tmp/ambient.wav

      - name: Smoke render — PolyphonicTrack
        run: |
          python - << 'EOF'
          from code_music import Song, Note, PolyphonicTrack
          from code_music.synth import Synth
          from code_music.export import export_wav
          import numpy as np
          song = Song(title="CI Poly Test", bpm=120, sample_rate=22050)
          pt = song.add_polytrack(PolyphonicTrack(name="piano", instrument="piano"))
          pt.add(Note("C", 4, 1.0), at=0.0)
          pt.add(Note("E", 4, 1.0), at=0.0)
          pt.add(Note("G", 4, 1.0), at=0.0)
          samples = Synth(22050).render_song(song)
          assert np.max(np.abs(samples)) > 0.1, "PolyphonicTrack produced no sound"
          export_wav(samples, "/tmp/poly_test.wav", 22050)
          print("PolyphonicTrack: OK")
          EOF

      - name: Smoke render — remix()
        run: |
          python - << 'EOF'
          from code_music import Song, Track, Note, remix
          song = Song(title="Original", bpm=120, sample_rate=22050)
          tr = song.add_track(Track(instrument="piano"))
          tr.add(Note("C", 4, 2.0))
          r = remix(song, semitones=5, bpm_factor=1.1)
          assert r.bpm == 132.0, f"Expected 132, got {r.bpm}"
          n = r.tracks[0].beats[0].event
          assert n.midi == 65, f"Expected F4 (65), got {n.midi}"
          print("remix(): OK")
          EOF

  ################################################################################
  # Batch render — runs on push to main, uploads as artifact (7-day retention)
  ################################################################################
  render:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Render all songs (WAV only — no ffmpeg needed)
        run: |
          mkdir -p dist/wav
          for f in songs/*.py; do
            stem=$(basename "$f" .py)
            case "$stem" in _*) continue ;; esac
            echo "Rendering $stem..."
            python -m code_music.cli "$f" -o "dist/wav/${stem}.wav" 2>&1 | tail -2
          done
          echo "Rendered $(ls dist/wav/*.wav 2>/dev/null | wc -l) songs"

      - name: Upload rendered songs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-songs-wav
          path: dist/wav/
          retention-days: 7

  ################################################################################
  # GitHub Release — triggered on tag push (v*), renders + zips + publishes
  ################################################################################
  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Render all songs to WAV
        run: |
          mkdir -p dist/wav
          count=0
          for f in songs/*.py; do
            stem=$(basename "$f" .py)
            case "$stem" in _*) continue ;; esac
            echo "[$((count+1))] Rendering $stem..."
            python -m code_music.cli "$f" -o "dist/wav/${stem}.wav" 2>&1 | tail -1
            count=$((count+1))
          done
          echo "Rendered $count songs"

      - name: Create ZIP archive
        run: |
          cd dist/wav
          zip -r ../../code-music-${{ github.ref_name }}-wav.zip *.wav
          cd ../..
          ls -lh code-music-${{ github.ref_name }}-wav.zip

      - name: Get song count and tag info
        id: info
        run: |
          count=$(ls dist/wav/*.wav 2>/dev/null | wc -l | tr -d ' ')
          tests=$(python -m pytest tests/ -q 2>&1 | tail -1 | grep -o '[0-9]* passed' | head -1)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "tests=$tests" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: code-music-${{ github.ref_name }}-wav.zip
          generate_release_notes: true
          body: |
            ## code-music ${{ github.ref_name }}

            **${{ steps.info.outputs.count }} songs** rendered to WAV (44100 Hz, 16-bit stereo).
            **${{ steps.info.outputs.tests }}** in the test suite.

            ### Download
            `code-music-${{ github.ref_name }}-wav.zip` contains all rendered songs as WAV files.

            ### Listen
            ```bash
            unzip code-music-${{ github.ref_name }}-wav.zip -d songs/
            # macOS: afplay songs/trance_odyssey.wav
            # Linux: aplay songs/trance_odyssey.wav
            ```

            ### Build from source
            ```bash
            git clone https://github.com/Talador12/code-music
            cd code-music
            make dev
            make songs-wav
            ```

  ################################################################################
  # PyPI Publish — triggered on tag push (v*), builds + uploads sdist+wheel
  ################################################################################
  pypi:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
