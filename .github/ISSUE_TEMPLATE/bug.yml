name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. code-music --new test.py
        2. Edit test.py to add ...
        3. code-music test.py --play
        4. Error: ...
  - type: input
    id: version
    attributes:
      label: code-music version
      placeholder: "code-music --version"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python --version"
